<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newman 7s Lineup Generator</title>
    <!-- Tailwind CSS for layout and styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for a professional sports graphic look -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

        /* * CONTAINER QUERIES 
         * This allows the graphic to scale perfectly across mobile, desktop, and print
         * by sizing fonts and padding relative to the graphic container's width (cqw)
         */
        #graphic-container {
            container-type: inline-size;
        }

        .dynamic-title { font-size: 4.5cqw; }
        .dynamic-subtitle { font-size: 1.5cqw; margin-top: 0.5cqw; }
        .dynamic-footer { font-size: 1.3cqw; padding: 1cqw 0; }
        .dynamic-num { font-size: 2cqw; padding: 0.8cqw 1.5cqw; min-width: 5cqw; }
        .dynamic-name { font-size: 1.8cqw; padding: 0.8cqw 2.5cqw; }

        /* The glassy UI effect for player badges */
        .glass-badge-num {
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-right: none;
            border-radius: 0.5cqw 0 0 0.5cqw;
            box-shadow: 0 4px 15px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-badge-name {
            background: linear-gradient(135deg, rgba(179, 11, 32, 0.85) 0%, rgba(110, 4, 15, 0.95) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(0, 0, 0, 0.8);
            border-radius: 0 0.5cqw 0.5cqw 0;
            box-shadow: 0 4px 15px 0 rgba(0, 0, 0, 0.3);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .glass-header {
            background: linear-gradient(90deg, rgba(179,11,32,0.9) 0%, rgba(120,4,20,0.9) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 1cqw;
        }

        /* 3D Pitch Container Styling */
        .pitch-perspective {
            perspective: 1000px;
        }

        .pitch-surface {
            transform: rotateX(55deg) scale(1.1);
            transform-origin: top center;
            background-image: repeating-linear-gradient(
                0deg, 
                #3a6b33, 
                #3a6b33 8%, 
                #407538 8%, 
                #407538 16%
            );
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
        }

        /* Print formatting */
        @media print {
            body * { visibility: hidden; }
            #sidebar { display: none !important; }
            #main-workspace { padding: 0 !important; background: white !important; }
            #graphic-container, #graphic-container * { visibility: visible; }
            #graphic-container {
                position: absolute;
                left: 0;
                top: 0;
                width: 100vw !important;
                max-width: 100vw !important;
                border: none !important;
                box-shadow: none !important;
                border-radius: 0 !important;
            }
            /* Fallback for print to PDF where blur might fail */
            .glass-badge-num { background: #111; }
            .glass-badge-name { background: #b30b20; }
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col md:flex-row min-h-screen">

    <!-- Sidebar Controls -->
    <!-- On mobile, this stacks on top. On desktop, it acts as a fixed sidebar -->
    <div id="sidebar" class="w-full md:w-80 md:h-screen md:overflow-y-auto bg-white p-6 shadow-2xl z-20 flex flex-col shrink-0">
        <div class="mb-6">
            <h1 class="text-2xl font-black text-red-800 uppercase tracking-tight">Newman 7s</h1>
            <p class="text-gray-500 text-sm mt-1 font-bold">Lineup Generator</p>
        </div>

        <div id="controls-container" class="flex-1 space-y-4 pr-2">
            <!-- Dropdowns will be injected here by JS -->
        </div>

        <div class="mt-8 pt-4 border-t border-gray-200 pb-4 md:pb-0">
            <button onclick="window.print()" class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                Export / Print PDF
            </button>
            <p class="text-xs text-gray-500 text-center mt-3 font-medium">
                Tip: Take a screenshot for social media, or print to PDF for high quality.
            </p>
        </div>
    </div>

    <!-- Main Graphic Workspace -->
    <div id="main-workspace" class="flex-1 p-2 sm:p-4 md:p-8 bg-slate-900 flex items-center justify-center min-h-[50vh] md:min-h-screen md:h-screen md:overflow-y-auto relative">
        
        <!-- Ambient background glow behind the pitch -->
        <div class="absolute inset-0 bg-gradient-to-br from-red-900/20 to-slate-900 pointer-events-none"></div>

        <!-- The Graphic Container (Responsive Aspect Ratio) -->
        <div id="graphic-container" class="w-full max-w-5xl bg-[#111] aspect-[4/3] relative overflow-hidden shadow-2xl md:rounded-2xl border border-white/10 ring-4 md:ring-8 ring-black/40">
            
            <!-- 3D Pitch Background -->
            <div class="absolute inset-0 pitch-perspective flex items-center justify-center pointer-events-none">
                <div class="w-[180%] h-[150%] absolute top-[5%] pitch-surface relative">
                    <!-- Pitch Markings -->
                    <div class="absolute inset-x-[20%] inset-y-[10%] border-[2px] md:border-[3px] border-white/40 shadow-[0_0_10px_rgba(255,255,255,0.2)]"></div>
                    <div class="absolute top-1/2 left-[20%] right-[20%] border-t-[2px] md:border-[3px] border-white/40 shadow-[0_0_10px_rgba(255,255,255,0.2)]"></div>
                    <div class="absolute top-[30%] left-[20%] right-[20%] border-t-[2px] md:border-[3px] border-white/40"></div>
                    <div class="absolute top-[70%] left-[20%] right-[20%] border-t-[2px] md:border-[3px] border-white/40"></div>
                </div>
            </div>

            <!-- Foreground Overlay (Headers & Players) -->
            <div class="absolute inset-0 flex flex-col pointer-events-none z-10">
                
                <!-- Header Banner (Shields Removed) -->
                <div class="w-[90%] mx-auto mt-[4cqw] glass-header text-white flex items-center justify-center px-[4cqw] py-[2cqw]">
                    <div class="text-center flex-1">
                        <h2 class="dynamic-title font-black tracking-widest uppercase m-0 leading-none drop-shadow-lg">
                            Newman College
                        </h2>
                        <p class="dynamic-subtitle font-bold tracking-[0.4em] text-red-200 uppercase drop-shadow-md">
                            1st VII Women
                        </p>
                    </div>
                </div>

                <!-- Players Area Container -->
                <div id="players-layer" class="flex-1 relative w-full">
                    <!-- Badges injected by JS -->
                </div>

                <!-- Footer Banner -->
                <div class="w-[70%] mx-auto mb-[4cqw] glass-header text-white text-center border-t-0 border-b-0">
                    <p class="dynamic-footer font-bold tracking-[0.2em] uppercase drop-shadow-md">
                        Head Coach: Phil Ward
                    </p>
                </div>

            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // Data Structure
        const SQUAD_LIST = [
            'BACON', 'CROSS', 'DICKINSON', 'FOSTER', 'GAUTRON', 
            'HIGGINS', 'JACKSON', 'JAMES', 'MUSSELL', 'SILSBY', 
            'SMITH', 'VARNEY', 'WILLIAMS'
        ].sort();

        // X/Y relative to the pitch container for 7s spacing
        const POSITIONS = [
            { num: 1, role: 'Prop', x: '25%', y: '28%' },
            { num: 2, role: 'Hooker', x: '50%', y: '28%' },
            { num: 3, role: 'Prop', x: '75%', y: '28%' },
            { num: 4, role: 'Scrum Half', x: '50%', y: '48%' },
            { num: 5, role: 'Fly Half', x: '32%', y: '68%' },
            { num: 6, role: 'Center', x: '68%', y: '68%' },
            { num: 7, role: 'Wing', x: '50%', y: '86%' }
        ];

        // Initial starting lineup state
        let currentLineup = {
            1: 'MUSSELL',
            2: 'BACON',
            3: 'VARNEY',
            4: 'FOSTER',
            5: 'JACKSON',
            6: 'GAUTRON',
            7: 'DICKINSON'
        };

        // DOM Elements
        const controlsContainer = document.getElementById('controls-container');
        const playersLayer = document.getElementById('players-layer');

        // Initialize the app
        function init() {
            renderControls();
            renderPitch();
        }

        // Render the sidebar dropdowns
        function renderControls() {
            controlsContainer.innerHTML = '';
            
            POSITIONS.forEach(pos => {
                const wrap = document.createElement('div');
                wrap.className = 'flex flex-col';
                
                const label = document.createElement('label');
                label.className = 'text-xs font-bold text-gray-500 uppercase mb-1';
                label.innerText = `${pos.num} - ${pos.role}`;
                
                const select = document.createElement('select');
                select.className = 'w-full border border-gray-300 rounded-md p-2 bg-gray-50 text-gray-900 font-bold focus:ring-2 focus:ring-red-700 focus:border-red-700 outline-none transition-shadow';
                select.onchange = (e) => handlePlayerChange(pos.num, e.target.value);
                
                // Add blank option
                const defaultOpt = document.createElement('option');
                defaultOpt.value = '';
                defaultOpt.innerText = 'Select Player...';
                select.appendChild(defaultOpt);

                // Add squad options
                SQUAD_LIST.forEach(player => {
                    const opt = document.createElement('option');
                    opt.value = player;
                    opt.innerText = player;
                    if (currentLineup[pos.num] === player) {
                        opt.selected = true;
                    }
                    select.appendChild(opt);
                });

                wrap.appendChild(label);
                wrap.appendChild(select);
                controlsContainer.appendChild(wrap);
            });
        }

        // Render the players on the graphic
        function renderPitch() {
            playersLayer.innerHTML = '';

            POSITIONS.forEach(pos => {
                const playerName = currentLineup[pos.num];
                if (!playerName) return; // Skip if no player selected

                // Create the badge container
                const badge = document.createElement('div');
                badge.className = 'absolute flex transition-all duration-300 ease-in-out transform';
                badge.style.left = pos.x;
                badge.style.top = pos.y;
                // Center the badge on its coordinates
                badge.style.transform = 'translate(-50%, -50%)';

                // Number Block
                const numBlock = document.createElement('div');
                numBlock.className = 'glass-badge-num dynamic-num text-white font-black flex items-center justify-center';
                numBlock.innerText = pos.num;

                // Name Block
                const nameBlock = document.createElement('div');
                nameBlock.className = 'glass-badge-name dynamic-name text-white font-black flex-1 text-center whitespace-nowrap uppercase tracking-widest';
                nameBlock.innerText = playerName;

                badge.appendChild(numBlock);
                badge.appendChild(nameBlock);
                playersLayer.appendChild(badge);
            });
        }

        // Handle dropdown selection change
        function handlePlayerChange(positionNum, newPlayer) {
            currentLineup[positionNum] = newPlayer;
            renderPitch(); // Re-render the canvas with the new state
        }

        // Boot up
        init();
    </script>
</body>
</html>
